version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: usermgmt_db
    environment:
      POSTGRES_DB: usermgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: usermgmt_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=usermgmt;Username=postgres;Password=secret"
      Jwt__Key: "super-secret-key-minimum-32-characters!!"
      Jwt__Issuer: "usermgmt-api"
      Jwt__Audience: "usermgmt-client"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5000:8080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: usermgmt_web
    depends_on:
      - api
    ports:
      - "4200:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: usermgmt_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: usermgmt_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pg_data: 
  prometheus_data:
  grafana_data:
